# Secreto para almacenar las credenciales de la base de datos de forma segura.
# Usamos stringData para facilitar la definición sin tener que codificar manualmente en base64.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: pmotrack
type: Opaque
stringData:
  POSTGRES_DB: pmotrack
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: pmotracksecretpassword
